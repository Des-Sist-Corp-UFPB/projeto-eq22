services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: iwrite
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5436:5432"
    volumes:
      - iwrite_e2e_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d iwrite"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DB_URL: jdbc:postgresql://db:5432/iwrite
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      SERVER_PORT: 8086
      APP_CORS_ALLOWED_ORIGINS: http://localhost:3001
    ports:
      - "8086:8086"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8086
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8086
    ports:
      - "3001:3001"
    command: ["npm", "run", "start", "--", "-p", "3001"]
    depends_on:
      - backend

volumes:
  iwrite_e2e_pgdata:
