services:
  db:
    image: postgres:16
    container_name: iwrite-db
    environment:
      POSTGRES_DB: iwrite
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - iwrite_pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d iwrite"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: iwrite-backend
    environment:
      DB_URL: jdbc:postgresql://db:5432/iwrite
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      SERVER_PORT: 8085
      IWRITE_DEVELOPMENT_CURRENT_USER_ENABLED: "true"
    ports:
      - "8085:8085"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8085
    container_name: iwrite-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8085
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  iwrite_pgdata:
