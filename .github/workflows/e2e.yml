name: Playwright E2E

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 0"

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: Start E2E stack
        run: docker compose -f docker-compose.e2e.yml up -d --build

      - name: Wait for backend
        run: |
          for i in {1..60}; do
            if curl --fail --silent http://localhost:8086/api/books > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose -f docker-compose.e2e.yml logs backend
          exit 1

      - name: Wait for frontend
        run: |
          for i in {1..60}; do
            if curl --fail --silent http://localhost:3001 > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose -f docker-compose.e2e.yml logs frontend
          exit 1

      - name: Run Playwright E2E
        working-directory: web
        run: npm run e2e

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            web/playwright-report/
            web/test-results/
          if-no-files-found: ignore
          retention-days: 7

      - name: Stop E2E stack
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v
