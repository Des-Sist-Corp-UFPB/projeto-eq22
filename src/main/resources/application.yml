spring:
  application:
    name: iwrite-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5435/iwrite}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

server:
  port: ${SERVER_PORT:8085}

iwrite:
  current-user:
    development:
      enabled: ${IWRITE_DEVELOPMENT_CURRENT_USER_ENABLED:false}
      user-id: ${IWRITE_DEVELOPMENT_CURRENT_USER_ID:00000000-0000-0000-0000-000000000002}
      tenant-id: ${IWRITE_DEVELOPMENT_TENANT_ID:00000000-0000-0000-0000-000000000001}
      time-zone-id: ${IWRITE_DEVELOPMENT_TIME_ZONE_ID:America/Sao_Paulo}
